<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Caixa - Simply Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 80px; background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; padding: 24px 0;
        }
        .sidebar-logo {
            width: 48px; height: 48px; background: var(--primary-color); color: #fff;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; margin-bottom: 32px; font-size: 1rem;
        }
        .nav-item {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); margin-bottom: 12px; cursor: pointer; transition: 0.2s;
        }
        .nav-item:hover { background-color: #F3F4F6; }
        .nav-item.active { background-color: rgba(16, 185, 129, 0.1); color: var(--primary-color); }
        .nav-item i { font-size: 1.5rem; }

        .main-content {
            flex: 1; padding: 32px; background-color: var(--bg-color);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 1.5rem; font-weight: 700; }

        /* Kanban Board */
        .kanban-board { display: flex; gap: 20px; overflow-x: auto; flex: 1; padding-bottom: 16px; }
        .kanban-column {
            background: #F3F4F6; border-radius: var(--radius-lg);
            width: 300px; min-width: 300px;
            display: flex; flex-direction: column; padding: 16px;
            max-height: calc(100vh - 160px); overflow-y: auto;
        }
        .kanban-header {
            font-weight: 700; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: #F3F4F6; z-index: 1; padding-bottom: 8px;
        }
        .kanban-count {
            background: var(--surface-color); color: var(--text-muted);
            padding: 2px 8px; border-radius: 12px; font-size: 0.8rem;
        }

        .order-card {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px;
            box-shadow: var(--shadow-sm); animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .order-id { font-weight: 700; font-size: 1rem; }
        .order-time { font-size: 0.78rem; color: var(--text-muted); }
        .order-customer { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
        .order-items { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; }
        .order-total { font-weight: 700; color: var(--primary-color); }
        .btn-action {
            background: transparent; border: 1px solid var(--border-color);
            padding: 4px 10px; border-radius: var(--radius-full);
            font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: 0.15s;
        }
        .btn-action:hover { opacity: 0.85; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.55); z-index: 1000; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal-content { background: #fff; padding: 28px; border-radius: var(--radius-lg); width: 100%; max-width: 520px; margin: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.125rem; font-weight: 700; }
        .btn-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">SD</div>
        <div class="nav-item" onclick="window.location.href='admin.html'" title="Dashboard"><i class="ph ph-squares-four"></i></div>
        <div class="nav-item active" title="Pedidos"><i class="ph ph-receipt"></i></div>
        <div style="margin-top:auto" class="nav-item" title="Sair" onclick="supabaseClient.auth.signOut().then(()=>window.location.href='index.html')"><i class="ph ph-sign-out"></i></div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Gestão de Pedidos</h1>
            <div style="display:flex; gap: 12px;">
                <button class="btn btn-secondary" id="btnRefresh"><i class="ph ph-arrow-clockwise"></i> Atualizar</button>
                <button class="btn btn-primary" id="btnNewOrder"><i class="ph ph-plus"></i> Novo Pedido Manual</button>
            </div>
        </div>

        <div class="kanban-board">
            <!-- Novos -->
            <div class="kanban-column">
                <div class="kanban-header">
                    <span style="color: #EF4444;"><i class="ph ph-bell-ringing"></i> Novos Pedidos</span>
                    <span class="kanban-count" id="count-new">0</span>
                </div>
                <div id="col-new"><!-- JS --></div>
            </div>

            <!-- Em Preparo -->
            <div class="kanban-column">
                <div class="kanban-header">
                    <span style="color: #F59E0B;"><i class="ph ph-cooking-pot"></i> Em Preparo</span>
                    <span class="kanban-count" id="count-prep">0</span>
                </div>
                <div id="col-prep"><!-- JS --></div>
            </div>

            <!-- Pronto -->
            <div class="kanban-column">
                <div class="kanban-header">
                    <span style="color: var(--primary-color);"><i class="ph ph-check-circle"></i> Pronto p/ Saída</span>
                    <span class="kanban-count" id="count-ready">0</span>
                </div>
                <div id="col-ready"><!-- JS --></div>
            </div>

            <!-- Entregando -->
            <div class="kanban-column">
                <div class="kanban-header">
                    <span style="color: #3B82F6;"><i class="ph ph-moped"></i> Saiu p/ Entrega</span>
                    <span class="kanban-count" id="count-delivering">0</span>
                </div>
                <div id="col-delivering"><!-- JS --></div>
            </div>
        </div>
    </main>
</div>

<!-- Modal: Novo Pedido Manual -->
<div class="modal-overlay" id="newOrderModal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title"><i class="ph ph-plus-circle"></i> Novo Pedido Manual</span>
            <button class="btn-close" onclick="document.getElementById('newOrderModal').style.display='none'">&times;</button>
        </div>
        <form id="newOrderForm">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="input-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="manualCustomerName" class="input" required placeholder="João Silva">
                </div>
                <div class="input-group">
                    <label>Telefone</label>
                    <input type="text" id="manualCustomerPhone" class="input" required placeholder="11999999999">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="input-group">
                    <label>Tipo</label>
                    <select id="manualOrderType" class="input">
                        <option value="delivery">🛵 Entrega</option>
                        <option value="pickup">🏠 Retirada</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Pagamento</label>
                    <select id="manualPayment" class="input">
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Observações</label>
                <input type="text" id="manualNotes" class="input" placeholder="Ex.: sem cebola, pagamento com troco de R$50...">
            </div>

            <hr style="border:none; border-top:1px solid var(--border-color); margin:16px 0;">
            <label style="font-weight:600; font-size:0.9rem;">Adicionar Produtos</label>
            <div style="display:flex; gap:8px; margin-top:8px; margin-bottom:12px;">
                <select id="manualProductSelect" class="input" style="flex:1;"></select>
                <input type="number" id="manualQty" class="input" value="1" min="1" style="width:72px;">
                <button type="button" class="btn btn-primary" style="padding:10px 14px; border-radius:var(--radius-sm);" onclick="Caixa.addToManualCart()">
                    <i class="ph ph-plus"></i>
                </button>
            </div>

            <div id="manualCartItems" style="min-height:40px; margin-bottom:8px;"></div>
            <div style="display:flex; justify-content:flex-end; font-weight:700; font-size:1rem; color:var(--primary-color); margin-bottom:16px;">
                Total: <span id="manualCartTotal" style="margin-left:8px;">R$ 0,00</span>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="ph ph-check"></i> Criar Pedido
            </button>
        </form>
    </div>
</div>

<script src="./js/supabase.js"></script>
<script src="./js/app.js"></script>
<script src="./js/caixa.js"></script>

</body>
</html>
