<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Produto - Simply Delivery</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            background-color: var(--surface-color);
        }
        
        /* Hero Image */
        .product-hero {
            position: relative;
            width: 100%;
            height: 250px;
            background: #fff;
        }
        .product-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-actions {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .btn-round-light {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            border: none;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        /* Product Details Sheet */
        .product-details-sheet {
            background: var(--surface-color);
            border-radius: 24px 24px 0 0;
            padding: 24px 16px;
            margin-top: -24px;
            position: relative;
            z-index: 20;
            min-height: 500px;
        }
        .drag-handle {
            width: 40px;
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }
        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .product-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .product-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .rating-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .rating-badge i { color: #F59E0B; }
        .main-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Section Container */
        .options-section {
            background: #F9FAFB;
            border: 1px solid #F3F4F6;
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-header {
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
        }
        
        /* Radios & Checkboxes */
        .radio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .radio-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 8px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .radio-card.selected {
            border-color: var(--primary-color);
            background: rgba(16, 185, 129, 0.05); /* Green tint */
        }
        .radio-card .check-icon {
            display: none;
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--primary-color);
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            align-items: center;
            justify-content: center;
        }
        .radio-card.selected .check-icon {
            display: flex;
        }
        .radio-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }
        .radio-price {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Addons List */
        .addon-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .addon-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .addon-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* Custom Checkbox */
        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            transition: 0.2s;
            cursor: pointer;
            background: #fff;
        }
        .addon-item.selected .custom-checkbox {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }
        .addon-name {
            font-size: 0.9rem;
            color: var(--text-main);
        }
        .addon-price-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .addon-price {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: 500;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 12px;
        }
        .qty-btn {
            border: none;
            background: transparent;
            color: var(--primary-color);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-value {
            font-weight: 600;
            font-size: 0.95rem;
            width: 16px;
            text-align: center;
        }

        /* Observations */
        .obs-textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            padding: 0;
        }

        /* Bottom Bar */
        .bottom-action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--surface-color);
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }
        .main-qty-control {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #F9FAFB;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 16px;
        }
        .btn-add-to-cart {
            flex: 1;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 16px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .page-content {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="page-content animate-fade-in">
        
        <!-- Hero Image -->
        <div class="product-hero">
            <div class="header-actions">
                <button class="btn-round-light" onclick="window.history.back()">
                    <i class="ph ph-arrow-left"></i>
                </button>
                <button class="btn-round-light">
                    <i class="ph ph-heart"></i>
                </button>
            </div>
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80" alt="Clássico Defumado">
        </div>

        <!-- Details Sheet -->
        <div class="product-details-sheet">
            <div class="drag-handle"></div>
            
            <h1 class="product-title">Clássico Defumado</h1>
            <p class="product-description">
                Carne bovina, cheddar, bacon defumado, brioche e molho especial da casa.
            </p>
            
            <div class="product-meta">
                <div class="rating-badge">
                    <i class="ph-fill ph-star"></i> 4,8 
                    <span style="color:var(--text-light);font-weight:400;margin-left:8px;">
                        <i class="ph-fill ph-fire" style="color:var(--primary-color)"></i> Mais pedido
                    </span>
                </div>
                <div class="main-price">R$ 32,90</div>
            </div>

            <!-- Size Options -->
            <div class="options-section">
                <div class="section-header">
                    <h3 class="section-title">Tamanho</h3>
                </div>
                <div class="radio-grid">
                    <div class="radio-card selected" onclick="selectRadio(this)">
                        <div class="check-icon"><i class="ph-bold ph-check"></i></div>
                        <div class="radio-name">Padrão</div>
                        <div class="radio-price">R$ 32,90</div>
                    </div>
                    <div class="radio-card" onclick="selectRadio(this)">
                        <div class="check-icon"><i class="ph-bold ph-check"></i></div>
                        <div class="radio-name">Duplo</div>
                        <div class="radio-price">R$ 42,90</div>
                    </div>
                    <div class="radio-card" onclick="selectRadio(this)">
                        <div class="check-icon"><i class="ph-bold ph-check"></i></div>
                        <div class="radio-name">Triplo</div>
                        <div class="radio-price">R$ 52,90</div>
                    </div>
                </div>
            </div>

            <!-- Addons -->
            <div class="options-section">
                <div class="section-header">
                    <h3 class="section-title">Adicionais</h3>
                </div>
                
                <div class="addon-item" onclick="toggleAddon(this)">
                    <div class="addon-info">
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                        <span class="addon-name">Cheddar extra</span>
                    </div>
                    <div class="addon-price-control">
                        <span class="addon-price">R$ 3,50</span>
                        <div class="qty-control" onclick="event.stopPropagation()">
                            <button class="qty-btn"><i class="ph ph-minus"></i></button>
                            <span class="qty-value">0</span>
                            <button class="qty-btn"><i class="ph ph-plus"></i></button>
                        </div>
                    </div>
                </div>

                <div class="addon-item" onclick="toggleAddon(this)">
                    <div class="addon-info">
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                        <span class="addon-name">Bacon crocante</span>
                    </div>
                    <div class="addon-price-control">
                        <span class="addon-price">R$ 4,50</span>
                        <div class="qty-control" onclick="event.stopPropagation()">
                            <button class="qty-btn"><i class="ph ph-minus"></i></button>
                            <span class="qty-value">0</span>
                            <button class="qty-btn"><i class="ph ph-plus"></i></button>
                        </div>
                    </div>
                </div>
                
                <div class="addon-item" onclick="toggleAddon(this)">
                    <div class="addon-info">
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                        <span class="addon-name">Cebola caramelizada</span>
                    </div>
                    <div class="addon-price-control">
                        <span class="addon-price">R$ 2,50</span>
                        <div class="qty-control" onclick="event.stopPropagation()">
                            <button class="qty-btn"><i class="ph ph-minus"></i></button>
                            <span class="qty-value">0</span>
                            <button class="qty-btn"><i class="ph ph-plus"></i></button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Observations -->
            <div class="options-section">
                <div class="section-header">
                    <h3 class="section-title">Observações</h3>
                </div>
                <textarea class="obs-textarea" rows="2" placeholder="Ex.: sem cebola, molho à parte, ponto da carne..."></textarea>
            </div>

        </div>

    </div>

    <!-- Bottom Action Bar -->
    <div class="bottom-action-bar">
        <div class="main-qty-control">
            <button class="qty-btn"><i class="ph ph-minus"></i></button>
            <span class="qty-value">1</span>
            <button class="qty-btn"><i class="ph ph-plus"></i></button>
        </div>
        
        <button class="btn-add-to-cart" onclick="window.location.href='carrinho.html'">
            <span>Adicionar ao carrinho</span>
            <span>R$ 32,90</span>
        </button>
    </div>
</div>

<script>
    function selectRadio(element) {
        // Remove selected class from all siblings
        const siblings = element.parentElement.children;
        for (let sibling of siblings) {
            sibling.classList.remove('selected');
        }
        // Add to clicked
        element.classList.add('selected');
    }

    function toggleAddon(element) {
        element.classList.toggle('selected');
        const qtyValue = element.querySelector('.qty-value');
        if (element.classList.contains('selected')) {
            if(qtyValue.innerText === "0") qtyValue.innerText = "1";
        } else {
            qtyValue.innerText = "0";
        }
    }
</script>

</body>
</html>
