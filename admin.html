<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Admin - Simply Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: var(--surface-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px 0; }
        .sidebar-logo { padding: 0 24px 24px; font-size: 1.25rem; font-weight: 700; color: var(--primary-color); border-bottom: 1px solid var(--border-color); margin-bottom: 16px; }
        .nav-menu { display: flex; flex-direction: column; gap: 4px; padding: 0 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-muted); font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { background-color: #F3F4F6; }
        .nav-item.active { background-color: rgba(16, 185, 129, 0.1); color: var(--primary-color); }
        .main-content { flex: 1; padding: 32px; background-color: var(--bg-color); overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 1.5rem; font-weight: 700; }
        .admin-section { display: none; }
        #section-dashboard { display: block; } /* default visible */
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: var(--surface-color); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); }
        .stat-card-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .stat-card-value { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items:center; justify-content:center; }
        .modal-content { background: #fff; padding: 24px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Simply Delivery</div>
        <nav class="nav-menu">
            <div class="nav-item active" data-target="section-dashboard"><i class="ph ph-squares-four"></i> Dashboard</div>
            <div class="nav-item" data-target="section-menu"><i class="ph ph-book-open"></i> Cardápio</div>
            <div class="nav-item" onclick="window.location.href='caixa.html'"><i class="ph ph-receipt"></i> Pedidos (Caixa)</div>
            <div class="nav-item" data-target="section-settings"><i class="ph ph-gear"></i> Configurações</div>
            <div class="nav-item" style="margin-top: auto; color: var(--danger-color);" onclick="supabaseClient.auth.signOut().then(()=>window.location.href='index.html')">
                <i class="ph ph-sign-out"></i> Sair
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <!-- DASHBOARD -->
        <div id="section-dashboard" class="admin-section">
            <div class="page-header">
                <h1 class="page-title">Dashboard</h1>
                <button class="btn btn-primary" onclick="window.location.href='cardapio.html'">Ver Cardápio Público</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-card-title">Pedidos Hoje <i class="ph ph-trend-up" style="color:var(--success-color)"></i></div><div class="stat-card-value">0</div></div>
                <div class="stat-card"><div class="stat-card-title">Vendas Hoje <i class="ph ph-currency-circle-dollar" style="color:var(--primary-color)"></i></div><div class="stat-card-value">R$ 0</div></div>
            </div>
        </div>

        <!-- CARDÁPIO -->
        <div id="section-menu" class="admin-section">
            <div class="page-header">
                <h1 class="page-title">Cardápio</h1>
            </div>
            
            <div class="card" style="margin-bottom: 24px;">
                <h3>Nova Categoria</h3>
                <div style="display:flex; gap:12px; margin-top:12px;">
                    <input type="text" id="newCatName" class="input" style="flex:1" placeholder="Ex: Hambúrgueres">
                    <button class="btn btn-primary" onclick="Admin.addCategory(document.getElementById('newCatName').value); document.getElementById('newCatName').value='';">Adicionar</button>
                </div>
            </div>

            <div id="menuList">
                <!-- Loaded via JS -->
            </div>
        </div>

        <!-- CONFIGURAÇÕES -->
        <div id="section-settings" class="admin-section">
            <div class="page-header">
                <h1 class="page-title">Configurações</h1>
            </div>
            <div class="card" style="max-width: 500px;">
                <form id="settingsForm" onsubmit="Admin.saveSettings(event)">
                    <div class="input-group">
                        <label>Nome do Restaurante</label>
                        <input type="text" id="setRestName" class="input" required>
                    </div>
                    <div class="input-group">
                        <label>URL (Slug) - ex: burger-house</label>
                        <input type="text" id="setRestSlug" class="input" required>
                    </div>
                    <div class="input-group">
                        <label>WhatsApp (com DDI e DDD)</label>
                        <input type="text" id="setRestWpp" class="input" placeholder="5511999999999" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnSaveSettings">Salvar Configurações</button>
                </form>
            </div>
        </div>
    </main>
</div>

<!-- Modal Produto -->
<div class="modal-overlay" id="productModal">
    <div class="modal-content">
        <h3>Novo Produto</h3>
        <form id="productForm" onsubmit="Admin.saveProduct(event)" style="margin-top: 16px;">
            <input type="hidden" id="modalCategoryId">
            <div class="input-group">
                <label>Nome</label>
                <input type="text" id="prodName" class="input" required>
            </div>
            <div class="input-group">
                <label>Descrição</label>
                <textarea id="prodDesc" class="input" style="resize:none" rows="3"></textarea>
            </div>
            <div class="input-group">
                <label>Preço (R$)</label>
                <input type="number" step="0.01" id="prodPrice" class="input" required>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top: 24px;">
                <button type="button" class="btn btn-secondary" onclick="Admin.closeProductModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Produto</button>
            </div>
        </form>
    </div>
</div>

<script src="./js/supabase.js"></script>
<script src="./js/app.js"></script>
<script src="./js/admin.js"></script>

</body>
</html>
