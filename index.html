<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Delivery - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            text-align: center;
        }
        .login-card h1 {
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        .login-card p {
            margin-bottom: 32px;
        }
        .login-form {
            text-align: left;
        }
        .btn-full {
            width: 100%;
            margin-top: 16px;
        }
        .demo-links {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .demo-links p {
            margin-bottom: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card login-card animate-fade-in">
            <h1>Simply Delivery</h1>
            <p>Acesse o painel do seu restaurante</p>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="input" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
            </form>

            <div class="demo-links">
                <p>Atalhos rápidos para visualização (Sem DB):</p>
                <a href="cardapio.html" class="btn btn-outline btn-full">Ver Cardápio Público</a>
                <a href="admin.html" class="btn btn-secondary btn-full">Ver Painel Admin</a>
                <a href="caixa.html" class="btn btn-secondary btn-full">Ver Painel Caixa</a>
                <a href="motoboy.html" class="btn btn-secondary btn-full">Ver Painel Motoboy</a>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="./js/supabase.js"></script>
    <script src="./js/app.js"></script>
    <script>
        // Simple login logic to be expanded later when Supabase is connected
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = "Entrando...";
            btn.disabled = true;

            // FAKE LOGIN PARA DEMONSTRAÇÃO
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1000);
        });
    </script>
</body>
</html>
