<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Delivery - Acesso</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            text-align: center;
        }
        .login-card h1 {
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        .login-card p {
            margin-bottom: 24px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .login-form {
            text-align: left;
        }
        .btn-full {
            width: 100%;
            margin-top: 16px;
        }
        #registerFields {
            display: none;
        }
        .error-msg {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-align: left;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card login-card animate-fade-in">
            <img src="./assets/logo.png" alt="Simply Delivery Logo" style="width: 80px; height: 80px; border-radius: 20px; object-fit: cover; margin: 0 auto 16px auto; display: block; box-shadow: var(--shadow-sm);">
            <h1>Simply Delivery</h1>
            <p>Gerencie seu restaurante</p>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="toggleAuthMode('login')">Entrar</div>
                <div class="auth-tab" id="tabRegister" onclick="toggleAuthMode('register')">Cadastrar</div>
            </div>

            <form class="login-form" id="authForm">
                
                <div id="registerFields">
                    <div class="input-group">
                        <label for="restaurantName">Nome do Restaurante</label>
                        <input type="text" id="restaurantName" class="input" placeholder="Ex: Burger House">
                    </div>
                    <div class="input-group">
                        <label for="userName">Seu Nome</label>
                        <input type="text" id="userName" class="input" placeholder="João Silva">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="input" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="input" placeholder="••••••••" required minlength="6">
                </div>

                <div class="error-msg" id="errorMsg"></div>

                <button type="submit" class="btn btn-primary btn-full" id="authBtn">Entrar</button>
            </form>

        </div>
    </div>

    <!-- Main Logic -->
    <script src="./js/supabase.js"></script>
    <script src="./js/app.js"></script>
    
</body>
</html>
