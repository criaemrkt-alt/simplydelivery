<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seu Pedido - Simply Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { background-color: var(--surface-color); }

        .header-cart {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; position: sticky; top: 0;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }
        .btn-icon-light { width: 40px; height: 40px; border-radius: 50%; background: #F3F4F6; display: flex; align-items: center; justify-content: center; color: var(--primary-color); border: none; cursor: pointer; }
        .header-title { font-size: 1.125rem; font-weight: 700; }
        .btn-text { color: var(--danger-color); font-size: 0.85rem; font-weight: 600; background: transparent; border: none; cursor: pointer; }

        /* Cart Items */
        .cart-items-container { padding: 0 16px; }
        .cart-item { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item-img { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .cart-item-title { font-weight: 700; font-size: 0.95rem; }
        .cart-item-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 6px; }
        .cart-item-obs { font-size: 0.8rem; color: var(--primary-color); margin-bottom: 10px; }
        .cart-item-bottom { display: flex; justify-content: space-between; align-items: center; }
        .cart-item-price { font-weight: 700; font-size: 1rem; }
        .qty-control { display: flex; align-items: center; gap: 10px; background: #F9FAFB; border: 1px solid var(--border-color); border-radius: 20px; padding: 4px 12px; }
        .qty-btn { border: none; background: transparent; color: var(--primary-color); cursor: pointer; font-size: 1rem; display: flex; align-items: center; }
        .qty-value { font-weight: 600; font-size: 0.9rem; min-width: 16px; text-align: center; }

        /* Sections */
        .section-box { padding: 16px; }

        /* Coupon */
        .coupon-box { display: flex; align-items: center; background: #F9FAFB; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 12px 16px; gap: 12px; }
        .coupon-box input { flex: 1; border: none; background: transparent; font-size: 0.9rem; outline: none; font-family: inherit; text-transform: uppercase; }
        .btn-apply { color: var(--primary-color); font-weight: 700; background: transparent; border: none; font-size: 0.9rem; cursor: pointer; }

        /* Delivery toggle */
        .toggle-box { display: flex; background: #F3F4F6; border-radius: var(--radius-lg); padding: 4px; margin-bottom: 16px; }
        .toggle-btn { flex: 1; padding: 10px; text-align: center; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
        .toggle-btn.active { background: #fff; color: var(--primary-color); box-shadow: var(--shadow-sm); }

        /* Customer Info */
        .customer-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .customer-form input { padding: 12px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-size: 0.9rem; font-family: inherit; outline: none; transition: 0.2s; }
        .customer-form input:focus { border-color: var(--primary-color); }

        /* Payment */
        .payment-section { padding: 0 16px; margin-top: 8px; }
        .section-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
        .payment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .payment-btn { border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; background: #fff; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .payment-btn.active { border-color: var(--primary-color); color: var(--primary-color); background: rgba(16,185,129,0.05); }
        .payment-btn i { font-size: 1.4rem; }

        /* Summary */
        .summary-box { padding: 20px 16px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .summary-row.discount { color: var(--success-color); font-weight: 600; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--border-color); font-size: 1.125rem; font-weight: 700; }

        /* Finalize */
        .finalize-btn-wrapper { padding: 0 16px 32px; }
        .btn-whatsapp { width: 100%; background: var(--primary-color); color: #fff; border: none; border-radius: var(--radius-lg); padding: 18px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 24px rgba(16,185,129,0.3); cursor: pointer; transition: 0.2s; }
        .btn-whatsapp:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-whatsapp:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .secure-note { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 4px; }

        #checkoutSection { }
    </style>
</head>
<body>

<div class="mobile-container">

    <!-- Header -->
    <header class="header-cart">
        <button class="btn-icon-light" id="btnBack"><i class="ph ph-arrow-left"></i></button>
        <div class="header-title">Seu pedido</div>
        <button class="btn-text" id="btnClearCart">Esvaziar</button>
    </header>

    <!-- Items -->
    <div class="cart-items-container" id="cartItemsContainer">
        <!-- Loaded via JS -->
    </div>

    <div id="checkoutSection">
        <!-- Coupon -->
        <div class="section-box">
            <div class="coupon-box">
                <i class="ph ph-tag" style="font-size: 1.2rem; color: var(--text-muted);"></i>
                <input type="text" id="couponInput" placeholder="Adicionar cupom de desconto">
                <button class="btn-apply" id="btnApplyCoupon">Aplicar</button>
            </div>
            <div id="couponFeedback" style="font-size:0.82rem; margin-top:8px; padding:0 4px;"></div>
        </div>

        <!-- Delivery / Pickup -->
        <div class="section-box">
            <div class="toggle-box">
                <div class="toggle-btn active" data-type="delivery"><i class="ph ph-moped"></i> Entrega</div>
                <div class="toggle-btn" data-type="pickup"><i class="ph ph-shopping-bag"></i> Retirada</div>
            </div>

            <!-- Customer data -->
            <div class="customer-form">
                <input type="text" id="customerName" placeholder="Seu nome completo" required>
                <input type="tel" id="customerPhone" placeholder="Seu WhatsApp (DDD + número)" required>
                <div id="addressSection">
                    <input type="text" id="customerAddress" placeholder="Endereço de entrega completo">
                </div>
            </div>
        </div>

        <!-- Payment -->
        <div class="payment-section">
            <div class="section-title">Forma de pagamento</div>
            <div class="payment-grid">
                <div class="payment-btn active" data-payment="Dinheiro">
                    <i class="ph ph-money"></i> Dinheiro
                </div>
                <div class="payment-btn" data-payment="Pix">
                    <i class="ph ph-qr-code"></i> Pix
                </div>
                <div class="payment-btn" data-payment="Cartão de Crédito">
                    <i class="ph ph-credit-card"></i> Crédito
                </div>
                <div class="payment-btn" data-payment="Cartão de Débito">
                    <i class="ph ph-bank"></i> Débito
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-box">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="summarySubtotal">R$ 0,00</span>
            </div>
            <div class="summary-row">
                <span>Taxa de entrega</span>
                <span id="summaryDelivery">Grátis</span>
            </div>
            <div class="summary-row discount">
                <span>Desconto</span>
                <span id="summaryDiscount">- R$ 0,00</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="summaryTotal">R$ 0,00</span>
            </div>
        </div>

        <!-- Finalize -->
        <div class="finalize-btn-wrapper">
            <button class="btn-whatsapp" id="btnFinalize">
                <i class="ph-fill ph-whatsapp-logo" style="font-size: 1.4rem;"></i>
                Finalizar Pedido
            </button>
            <div class="secure-note">
                <i class="ph ph-lock-key"></i> Seus dados estão protegidos
            </div>
        </div>
    </div>

</div>

<script src="./js/supabase.js"></script>
<script src="./js/cardapio.js"></script>
<script src="./js/carrinho.js"></script>

</body>
</html>
